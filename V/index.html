<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Will You Be My Valentine? 💕</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            background: #000;
            touch-action: manipulation;
        }

        .photo-container {
            position: fixed;
            width: 100vw;
            height: 100vh;
            top: 0;
            left: 0;
            opacity: 0;
            z-index: 1;
            overflow: hidden;
            display: none;
        }

        .photo-container.active {
            opacity: 1;
            z-index: 2;
            display: block;
        }

        .photo-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* ===== PHOTO 1: LOVE LETTER UNSEALING ===== */
        #photo1 {
            background: linear-gradient(135deg, #ffc3a0 0%, #ffafbd 100%);
        }

        .envelope {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 90%;
            max-width: 400px;
            height: 300px;
            background: #fff;
            border-radius: 10px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            cursor: pointer;
            transition: transform 0.2s ease;
        }

        .envelope:active {
            transform: translate(-50%, -50%) scale(0.98);
        }

        .envelope-back {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #fff;
            border-radius: 10px;
            z-index: 1;
        }

        .envelope-flap {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 50%;
            background: linear-gradient(to bottom, #ff6b9d 0%, #ff8fb3 100%);
            clip-path: polygon(0 0, 50% 60%, 100% 0);
            transform-origin: top center;
            transition: transform 0.6s ease;
            z-index: 5;
            border-radius: 10px 10px 0 0;
        }

        .envelope.opening .envelope-flap {
            transform: rotateX(-180deg);
        }

        .letter {
            position: absolute;
            top: 100px;
            left: 50%;
            transform: translateX(-50%);
            width: 85%;
            height: 180px;
            background: #fff9f0;
            border-radius: 5px;
            padding: 15px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            transition: top 0.7s ease;
            z-index: 3;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .envelope.opening .letter {
            top: -140px;
            z-index: 6;
        }

        .letter-content {
            text-align: center;
            color: #333;
            width: 100%;
        }

        .letter-content h2 {
            color: #ff6b9d;
            font-size: 1.6em;
            margin-bottom: 12px;
        }

        .letter-content p {
            font-size: 1em;
            line-height: 1.5;
            margin-bottom: 8px;
        }

        .tap-hint {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 107, 157, 0.95);
            color: white;
            padding: 15px 35px;
            border-radius: 30px;
            font-size: 1.2em;
            animation: bounce 2s infinite;
            z-index: 10;
            font-weight: 600;
            box-shadow: 0 8px 25px rgba(255, 107, 157, 0.4);
        }

        @keyframes bounce {
            0%, 100% { transform: translate(-50%, 0); }
            50% { transform: translate(-50%, -15px); }
        }

        .photo1-revealed {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            transition: opacity 0.8s ease;
            z-index: 0;
        }

        .photo1-revealed.show {
            opacity: 1;
        }

        /* ===== PHOTO 2: HEART COLLECTOR ===== */
        #photo2 {
            background: #000;
        }

        #photo2 img {
            filter: blur(20px) brightness(0.5);
            transition: filter 0.3s ease;
        }

        #photo2.revealing img {
            filter: blur(0px) brightness(1);
        }

        .floating-heart {
            position: absolute;
            font-size: 3em;
            cursor: pointer;
            animation: float 3s ease-in-out infinite;
            z-index: 10;
            transition: all 0.3s ease;
            user-select: none;
        }

        .floating-heart:active {
            transform: scale(1.5);
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(10deg); }
        }

        .hearts-counter {
            position: absolute;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 107, 157, 0.95);
            color: white;
            padding: 15px 40px;
            border-radius: 30px;
            font-size: 1.5em;
            font-weight: bold;
            z-index: 5;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.3);
        }

        .collect-instruction {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 107, 157, 0.95);
            color: white;
            padding: 12px 30px;
            border-radius: 25px;
            font-size: 1.1em;
            z-index: 5;
            text-align: center;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.3);
        }

        /* ===== PHOTO 3: TRACE THE HEART ===== */
        #photo3 {
            background: #000;
        }

        #photo3 img {
            filter: blur(30px) brightness(0.3);
            transition: filter 1s ease;
        }

        #photo3.revealing img {
            filter: blur(0px) brightness(1);
        }

        .heart-canvas {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
            touch-action: none;
        }

        .trace-instruction {
            position: absolute;
            top: 15%;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 107, 157, 0.95);
            color: white;
            padding: 18px 35px;
            border-radius: 30px;
            font-size: 1.2em;
            text-align: center;
            z-index: 5;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            max-width: 90%;
        }

        .progress-bar {
            position: absolute;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
            width: 80%;
            max-width: 300px;
            height: 25px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 15px;
            overflow: hidden;
            z-index: 5;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #ff6b9d, #ff1493);
            border-radius: 15px;
            transition: width 0.3s ease;
        }

        /* ===== POPUP ===== */
        .popup-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            animation: fadeIn 0.5s ease-in-out;
        }

        .popup-overlay.show {
            display: flex;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .popup {
            background: linear-gradient(135deg, #ff6b9d 0%, #c06c84 100%);
            padding: 40px 30px;
            border-radius: 30px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(255, 105, 180, 0.5);
            animation: popIn 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            max-width: 90vw;
        }

        @keyframes popIn {
            0% {
                transform: scale(0.5);
                opacity: 0;
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }

        .popup h1 {
            color: white;
            font-size: 1.8em;
            margin-bottom: 30px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .popup .hearts {
            font-size: 3em;
            margin-bottom: 20px;
            animation: heartbeat 1.5s infinite;
        }

        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            10%, 30% { transform: scale(1.1); }
            20%, 40% { transform: scale(1); }
        }

        .button-container {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 30px;
            position: relative;
            min-height: 80px;
        }

        .btn {
            padding: 15px 35px;
            font-size: 1.1em;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            touch-action: manipulation;
        }

        .btn-yes {
            background: #fff;
            color: #ff6b9d;
        }

        .btn-yes:active {
            transform: scale(1.1);
            box-shadow: 0 8px 25px rgba(255,255,255,0.3);
        }

        .btn-no {
            background: #f0f0f0;
            color: #666;
            position: absolute;
            transition: all 0.2s ease;
        }

        .celebration {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 9999;
        }

        .celebration.show {
            display: block;
        }

        .confetti {
            position: absolute;
            width: 10px;
            height: 10px;
            background: #ff6b9d;
            animation: confetti-fall 3s linear;
        }

        @keyframes confetti-fall {
            to {
                transform: translateY(100vh) rotate(360deg);
                opacity: 0;
            }
        }

        .success-message {
            display: none;
            color: white;
            font-size: 1.5em;
            margin-top: 20px;
            animation: fadeIn 0.5s ease-in-out;
        }

        .success-message.show {
            display: block;
        }

        @media (max-width: 768px) {
            .envelope {
                height: 270px;
            }
            .letter {
                height: 160px;
                padding: 12px;
                top: 90px;
            }
            .envelope.opening .letter {
                top: -130px;
            }
            .letter-content h2 {
                font-size: 1.4em;
                margin-bottom: 10px;
            }
            .letter-content p {
                font-size: 0.9em;
            }
            .popup h1 {
                font-size: 1.5em;
            }
            .tap-hint {
                font-size: 1.1em;
                padding: 12px 28px;
            }
        }

        @media (max-width: 480px) {
            .trace-instruction {
                font-size: 1em;
                padding: 12px 20px;
                top: 10%;
            }
            .letter-content h2 {
                font-size: 1.2em;
            }
            .letter-content p {
                font-size: 0.85em;
            }
        }
    </style>
</head>
<body>
    <!-- Photo 1: Love Letter -->
    <div class="photo-container active" id="photo1">
        <img src="1.jpeg" alt="Photo 1" class="photo1-revealed" id="photo1Img">
        <div class="envelope" id="envelope">
            <div class="envelope-back"></div>
            <div class="letter">
                <div class="letter-content">
                    <h2>To My Valentine 💕</h2>
                    <p>Every moment with you is a treasure...</p>
                    <p>Let me show you some of our favorite memories</p>
                </div>
            </div>
            <div class="envelope-flap"></div>
        </div>
        <div class="tap-hint" id="tapHint">👆 Tap to Open 💌</div>
    </div>

    <!-- Photo 2: Heart Collector -->
    <div class="photo-container" id="photo2">
        <img src="2.jpeg" alt="Photo 2">
        <div class="hearts-counter" id="heartsCounter">❤️ <span id="heartCount">0/7</span></div>
        <div class="collect-instruction">Tap all the hearts! 💕</div>
        <div id="floatingHeartsContainer"></div>
    </div>

    <!-- Photo 3: Trace the Heart -->
    <div class="photo-container" id="photo3">
        <img src="3.jpeg" alt="Photo 3">
        <div class="trace-instruction">Trace the heart outline 💗</div>
        <canvas class="heart-canvas" id="heartCanvas"></canvas>
        <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
        </div>
    </div>

    <!-- Valentine Popup -->
    <div class="popup-overlay" id="popupOverlay">
        <div class="popup">
            <div class="hearts">💕 💖 💕</div>
            <h1>Will You Be My Valentine?</h1>
            <div class="button-container" id="buttonContainer">
                <button class="btn btn-yes" id="btnYes">Yes! 💗</button>
                <button class="btn btn-no" id="btnNo">No</button>
            </div>
            <div class="success-message" id="successMessage">
                🎉 Yay! You made me the happiest! 🎉
            </div>
        </div>
    </div>

    <!-- Celebration Effect -->
    <div class="celebration" id="celebration"></div>

    <script>
        let currentPhoto = 1;

        // ===== PHOTO 1: LOVE LETTER TAP TO OPEN =====
        const envelope = document.getElementById('envelope');
        const tapHint = document.getElementById('tapHint');
        const photo1Img = document.getElementById('photo1Img');
        let envelopeOpened = false;

        envelope.addEventListener('click', openEnvelope);
        envelope.addEventListener('touchend', (e) => {
            e.preventDefault();
            openEnvelope();
        });

        function openEnvelope() {
            if (envelopeOpened) return;
            envelopeOpened = true;

            // Vibrate if supported
            if (navigator.vibrate) navigator.vibrate(100);

            // Open envelope
            envelope.classList.add('opening');
            tapHint.style.opacity = '0';

            // Show photo after letter comes out
            setTimeout(() => {
                photo1Img.classList.add('show');
                
                // Transition to next photo
                setTimeout(() => {
                    transitionToPhoto(2);
                }, 2500);
            }, 700);
        }

        // ===== PHOTO 2: HEART COLLECTOR =====
        let heartsCollected = 0;
        const totalHearts = 7;

        function initHeartCollector() {
            const container = document.getElementById('floatingHeartsContainer');
            const heartEmojis = ['💕', '💖', '💗', '💓', '💝', '💘', '❤️'];
            
            for (let i = 0; i < totalHearts; i++) {
                const heart = document.createElement('div');
                heart.className = 'floating-heart';
                heart.textContent = heartEmojis[i];
                heart.style.left = Math.random() * 80 + 10 + '%';
                heart.style.top = Math.random() * 60 + 20 + '%';
                heart.style.animationDelay = Math.random() * 2 + 's';
                
                heart.addEventListener('click', () => collectHeart(heart));
                heart.addEventListener('touchstart', (e) => {
                    e.preventDefault();
                    collectHeart(heart);
                });
                
                container.appendChild(heart);
            }
        }

        function collectHeart(heart) {
            if (heart.classList.contains('collected')) return;
            
            heart.classList.add('collected');
            heartsCollected++;
            
            // Animate heart collection
            heart.style.animation = 'none';
            heart.style.transform = 'scale(2)';
            heart.style.opacity = '0';
            
            if (navigator.vibrate) navigator.vibrate(50);
            
            document.getElementById('heartCount').textContent = `${heartsCollected}/${totalHearts}`;
            
            // Update photo reveal
            const photo2 = document.getElementById('photo2');
            const blurAmount = 20 - (heartsCollected / totalHearts) * 20;
            const brightness = 0.5 + (heartsCollected / totalHearts) * 0.5;
            photo2.querySelector('img').style.filter = `blur(${blurAmount}px) brightness(${brightness})`;
            
            if (heartsCollected === totalHearts) {
                setTimeout(() => {
                    photo2.classList.add('revealing');
                    setTimeout(() => {
                        transitionToPhoto(3);
                    }, 1500);
                }, 500);
            }
        }

        // ===== PHOTO 3: TRACE THE HEART =====
        let canvas, ctx;
        let isDrawing = false;
        let traceProgress = 0;
        const heartPath = [];

        function initHeartTracing() {
            canvas = document.getElementById('heartCanvas');
            ctx = canvas.getContext('2d');
            
            // Set canvas size
            const size = Math.min(window.innerWidth, window.innerHeight) * 0.6;
            canvas.width = size;
            canvas.height = size;
            
            // Draw heart outline
            drawHeartOutline();
            generateHeartPath();
            
            canvas.addEventListener('touchstart', startDrawing);
            canvas.addEventListener('touchmove', draw);
            canvas.addEventListener('touchend', stopDrawing);
            
            canvas.addEventListener('mousedown', startDrawing);
            canvas.addEventListener('mousemove', draw);
            canvas.addEventListener('mouseup', stopDrawing);
        }

        function drawHeartOutline() {
            ctx.strokeStyle = '#ff6b9d';
            ctx.lineWidth = 8;
            ctx.shadowBlur = 15;
            ctx.shadowColor = '#ff6b9d';
            
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2.5;
            const size = canvas.width / 4;
            
            ctx.beginPath();
            ctx.moveTo(centerX, centerY + size);
            
            // Left curve
            ctx.bezierCurveTo(
                centerX - size * 1.5, centerY - size * 0.5,
                centerX - size, centerY - size,
                centerX, centerY - size * 0.3
            );
            
            // Right curve
            ctx.bezierCurveTo(
                centerX + size, centerY - size,
                centerX + size * 1.5, centerY - size * 0.5,
                centerX, centerY + size
            );
            
            ctx.stroke();
        }

        function generateHeartPath() {
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2.5;
            const size = canvas.width / 4;
            
            // Sample points along the heart path
            for (let t = 0; t <= 1; t += 0.01) {
                const angle = t * Math.PI * 2;
                const x = centerX + size * 1.2 * Math.sin(angle) * Math.sin(angle) * Math.sin(angle);
                const y = centerY - size * (13 * Math.cos(angle) - 5 * Math.cos(2 * angle) - 2 * Math.cos(3 * angle) - Math.cos(4 * angle)) / 16;
                heartPath.push({ x, y });
            }
        }

        function startDrawing(e) {
            isDrawing = true;
            const pos = getPosition(e);
            ctx.beginPath();
            ctx.moveTo(pos.x, pos.y);
        }

        function draw(e) {
            if (!isDrawing) return;
            e.preventDefault();
            
            const pos = getPosition(e);
            
            // Draw user's trace
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 12;
            ctx.lineCap = 'round';
            ctx.shadowBlur = 20;
            ctx.shadowColor = '#fff';
            ctx.lineTo(pos.x, pos.y);
            ctx.stroke();
            
            // Check if near heart path
            const nearPath = heartPath.some(point => {
                const distance = Math.sqrt(Math.pow(point.x - pos.x, 2) + Math.pow(point.y - pos.y, 2));
                return distance < 30;
            });
            
            if (nearPath) {
                traceProgress += 0.5;
                updateProgress();
            }
        }

        function stopDrawing() {
            isDrawing = false;
        }

        function getPosition(e) {
            const rect = canvas.getBoundingClientRect();
            const x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
            const y = (e.touches ? e.touches[0].clientY : e.clientY) - rect.top;
            return { x, y };
        }

        function updateProgress() {
            const percentage = Math.min((traceProgress / 100) * 100, 100);
            document.getElementById('progressFill').style.width = percentage + '%';
            
            // Update photo reveal
            const photo3 = document.getElementById('photo3');
            const blurAmount = 30 - (percentage / 100) * 30;
            const brightness = 0.3 + (percentage / 100) * 0.7;
            photo3.querySelector('img').style.filter = `blur(${blurAmount}px) brightness(${brightness})`;
            
            if (percentage >= 100) {
                photo3.classList.add('revealing');
                if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
                setTimeout(() => {
                    showPopup();
                }, 1000);
            }
        }

        // ===== TRANSITIONS =====
        function transitionToPhoto(photoNum) {
            document.querySelectorAll('.photo-container').forEach(p => p.classList.remove('active'));
            document.getElementById(`photo${photoNum}`).classList.add('active');
            currentPhoto = photoNum;
            
            if (photoNum === 2) {
                initHeartCollector();
            } else if (photoNum === 3) {
                initHeartTracing();
            }
        }

        function showPopup() {
            document.getElementById('popupOverlay').classList.add('show');
        }

        // ===== NO BUTTON RUNS AWAY =====
        const btnNo = document.getElementById('btnNo');
        const buttonContainer = document.getElementById('buttonContainer');
        let noButtonMoves = 0;

        btnNo.addEventListener('mouseenter', () => moveNoButton());
        btnNo.addEventListener('touchstart', (e) => { e.preventDefault(); moveNoButton(); });
        btnNo.addEventListener('click', (e) => { e.preventDefault(); moveNoButton(); });

        function moveNoButton() {
            noButtonMoves++;
            const containerRect = buttonContainer.getBoundingClientRect();
            const maxX = containerRect.width - btnNo.offsetWidth;
            const maxY = 250;
            
            let newX = Math.random() * maxX - (maxX / 2);
            let newY = (Math.random() - 0.5) * maxY;
            
            btnNo.style.transform = `translate(${newX}px, ${newY}px)`;
            
            if (navigator.vibrate) navigator.vibrate(50);
            if (noButtonMoves >= 3) {
                document.getElementById('btnYes').style.transform = 'scale(1.2)';
            }
        }

        // ===== YES BUTTON CELEBRATION =====
        document.getElementById('btnYes').addEventListener('click', () => {
            if (navigator.vibrate) navigator.vibrate([100, 50, 100, 50, 100]);
            
            document.getElementById('buttonContainer').style.display = 'none';
            document.getElementById('successMessage').classList.add('show');
            
            const celebration = document.getElementById('celebration');
            celebration.classList.add('show');
            
            const colors = ['#ff6b9d', '#c06c84', '#ffd700', '#ff1493', '#ff69b4'];
            
            for (let i = 0; i < 100; i++) {
                setTimeout(() => {
                    const confetti = document.createElement('div');
                    confetti.className = 'confetti';
                    confetti.style.left = Math.random() * 100 + 'vw';
                    confetti.style.background = colors[Math.floor(Math.random() * colors.length)];
                    confetti.style.animationDelay = Math.random() * 0.5 + 's';
                    celebration.appendChild(confetti);
                    
                    setTimeout(() => confetti.remove(), 3000);
                }, i * 30);
            }
        });
    </script>
</body>
</html>
